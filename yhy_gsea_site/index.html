    const $ = id => document.getElementById(id);
    function option(select, rows) {
      select.innerHTML = rows.map(x => `<option value="${x.value}">${x.label}</option>`).join("");
    }
    function fmt(x) {
      if (x === null || x === undefined || x === "") return "NA";
      const n = Number(x);
      if (!Number.isFinite(n)) return x;
      if (Math.abs(n) < 0.001 && n !== 0) return n.toExponential(3);
      return String(Math.round(n * 1000000) / 1000000);
    }
    async function loadCsv(path) {
      const text = await fetch(path).then(r => r.text());
      const rows = [];
      let row = [], cell = "", quote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"' && quote && next === '"') { cell += '"'; i++; }
        else if (ch === '"') quote = !quote;
        else if (ch === ',' && !quote) { row.push(cell); cell = ""; }
        else if ((ch === '\n' || ch === '\r') && !quote) {
          if (ch === '\r' && next === '\n') i++;
          row.push(cell); cell = "";
          if (row.some(v => v.length)) rows.push(row);
          row = [];
        } else cell += ch;
      }
      if (cell.length || row.length) { row.push(cell); rows.push(row); }
      return rows;
    }
    function renderTable(rows) {
      if (!rows.length) { $("resultTable").innerHTML = ""; return; }
      const head = rows[0], body = rows.slice(1, 301);
      $("resultTable").innerHTML =
        `<thead><tr>${head.map(h => `<th>${h}</th>`).join("")}</tr></thead>` +
        `<tbody>${body.map(r => `<tr>${head.map((_, i) => `<td>${r[i] ?? ""}</td>`).join("")}</tr>`).join("")}</tbody>`;
    }
    function populate() {
      const sets = manifest.gene_sets.map(x => ({ value: x.id, label: `${x.display_name} (${x.count})` }));
      option($("geneSet"), sets);
      const sheets = [...new Set(manifest.backgrounds.flatMap(x => [x.treat, x.control]))];
      option($("treatSheet"), sheets.map(x => ({ value: x, label: x })));
      option($("controlSheet"), sheets.map(x => ({ value: x, label: x })));
      if (sheets.includes("delaminatory")) $("treatSheet").value = "delaminatory";
      if (sheets.includes("neural tube")) $("controlSheet").value = "neural tube";
      showResult();
    }
    async function showResult() {
      const gs = $("geneSet").value;
      const treat = $("treatSheet").value;
      const control = $("controlSheet").value;
      const item = manifest.gsea.find(x => x.gene_set === gs && x.treat === treat && x.control === control);
      if (!item) {
        $("plotBox").innerHTML = "";
        $("meta").innerHTML = "请选择两个不同的 sheet。";
        $("links").innerHTML = "";
        $("resultTable").innerHTML = "";
        return;
      }
      $("loading").classList.add("active");
      $("plotBox").innerHTML = "";
      $("meta").innerHTML = `
        <b>${item.gene_set_label}</b><br>
        Background: ${item.background_label}<br>
        Treat: ${item.treat}<br>
        Control: ${item.control}<br>
        Matched genes: ${item.matched_count} / ${item.gene_set_count}<br>
        Filtered ranking genes: ${item.filtered_gene_count}<br>
        NES: ${fmt(item.nes)}<br>
        p-value: ${fmt(item.pvalue)}<br>
        FDR: ${fmt(item.fdr)}`;
      $("links").innerHTML = `
        <a href="${item.pdf}" download>下载 PDF 矢量图</a>
        <a href="${item.png}" download>下载 PNG</a>
        <a href="${item.table_csv}" download>下载 GSEA 结果 CSV</a>`;
      const img = new Image();
      img.onload = () => $("loading").classList.remove("active");
      img.src = item.png;
      img.alt = "GSEA plot";
      $("plotBox").appendChild(img);
      renderTable(await loadCsv(item.table_csv));
    }
    $("geneSet").addEventListener("change", showResult);
    $("treatSheet").addEventListener("change", showResult);
    $("controlSheet").addEventListener("change", showResult);
    populate();
  </script>
